services:
  jellyfin:
    image: lscr.io/linuxserver/jellyfin:latest
    restart: unless-stopped
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - ${DATA_DIR}/jellyfin/config:/config
      - ${DATA_DIR}/media:/data/media
    labels:
      - traefik.enable=true
      - traefik.http.routers.jellyfin.rule=Host(`${JELLYFIN_HOST}`)
      - traefik.http.routers.jellyfin.entrypoints=websecure
      - traefik.http.routers.jellyfin.tls.certresolver=tailscale
      - traefik.http.routers.jellyfin.middlewares=${TRAEFIK_AUTH_MIDDLEWARE}
      - traefik.http.services.jellyfin.loadbalancer.server.port=8096
